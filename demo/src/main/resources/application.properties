# ─────────────────────────────────────────────────────────────────────────────
# Application
# ─────────────────────────────────────────────────────────────────────────────
spring.application.name=jvmobservability
server.port=${SERVER_PORT:8080}

# ─────────────────────────────────────────────────────────────────────────────
# Kafka bootstrap server (used only by KafkaHealthIndicator — no spring-kafka needed)
# ─────────────────────────────────────────────────────────────────────────────
kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# ─────────────────────────────────────────────────────────────────────────────
# Organic Liveness Test Flag
# ─────────────────────────────────────────────────────────────────────────────
# false (default) → LivenessTestRunner bean is inactive, app starts normally
# true            → LivenessTestRunner throws during ApplicationRunner phase
#                   Spring auto-publishes ApplicationFailedEvent
#                   → LivenessState = BROKEN (no controller needed)
#                   → /actuator/health/liveness returns HTTP 503
# Restore: set back to false and restart
test.liveness.fail=${TEST_LIVENESS_FAIL:false}

# ─────────────────────────────────────────────────────────────────────────────
# MongoDB connection
# ─────────────────────────────────────────────────────────────────────────────
# connectTimeoutMS     — how long driver waits to open a new TCP connection
# serverSelectionTimeoutMS — how long driver searches for an available server
#                            DEFAULT is 30s → health check hangs 30s before DOWN
#                            Set to 3s → health shows DOWN within 3s of Mongo stopping
# heartbeatFrequencyMS — how often background thread checks server state
#                        DEFAULT is 10s → driver blind for 10s after Mongo stops
#                        Set to 2s → driver detects failure within 2s
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/musicdb}

# ─────────────────────────────────────────────────────────────────────────────
# Actuator — expose every endpoint over HTTP
# ─────────────────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# ─────────────────────────────────────────────────────────────────────────────
# Liveness and Readiness probe groups (Kubernetes / OCP probes)
# ─────────────────────────────────────────────────────────────────────────────
# Liveness  → /actuator/health/liveness
#   Only checks LivenessState. MongoDB/Disk DOWN has NO effect here.
#   BROKEN → HTTP 503 → OCP restarts the pod.
management.endpoint.health.group.liveness.include=livenessState

# Readiness → /actuator/health/readiness
#   REFUSING_TRAFFIC → HTTP 503 → OCP removes pod from load balancer (pod NOT killed).
management.endpoint.health.group.readiness.include=readinessState,mongo,elasticsearch,kafka

# Base path for all Actuator endpoints
management.endpoints.web.base-path=/actuator

# ─────────────────────────────────────────────────────────────────────────────
# Metrics — enable every JVM metric category
# ─────────────────────────────────────────────────────────────────────────────
management.metrics.enable.jvm.memory=true
management.metrics.enable.jvm.gc=true
management.metrics.enable.jvm.threads=true
management.metrics.enable.jvm.classes=true
management.metrics.enable.jvm.buffer=true
management.metrics.enable.jvm.compilation=true
management.metrics.enable.process=true

# ─────────────────────────────────────────────────────────────────────────────
# MinIO object storage (MP3 files)
# ─────────────────────────────────────────────────────────────────────────────
minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadmin123}
minio.bucket-name=${MINIO_BUCKET_NAME:music}

# Allow large MP3 file uploads
spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE:50MB}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE:50MB}

# ─────────────────────────────────────────────────────────────────────────────
# Thread Pool — BOUNDED (FIX for Issue 1: Unbounded Thread Pool)
# Default Spring Boot thread pool is Integer.MAX_VALUE (unbounded).
# Under high load this causes unlimited thread creation → heap explosion → OOM crash.
# ─────────────────────────────────────────────────────────────────────────────
spring.task.execution.pool.core-size=${TASK_POOL_CORE_SIZE:10}
spring.task.execution.pool.max-size=${TASK_POOL_MAX_SIZE:30}
spring.task.execution.pool.queue-capacity=${TASK_POOL_QUEUE_CAPACITY:100}
spring.task.execution.thread-name-prefix=music-task-

# ─────────────────────────────────────────────────────────────────────────────
# Prometheus (scrape endpoint at /actuator/prometheus)
# ─────────────────────────────────────────────────────────────────────────────
management.prometheus.metrics.export.enabled=true

# ─────────────────────────────────────────────────────────────────────────────
# Fix: UNKNOWN URI in http_server_requests metrics (Issue 4)
# ─────────────────────────────────────────────────────────────────────────────
management.metrics.web.server.request.autotime.enabled=true
management.metrics.web.server.request.ignore-trailing-slash=true

# ─────────────────────────────────────────────────────────────────────────────
# OpenTelemetry (OTLP) — push metrics to OTel Collector
# ─────────────────────────────────────────────────────────────────────────────
management.otlp.metrics.export.enabled=${OTLP_ENABLED:true}
management.otlp.metrics.export.url=${MANAGEMENT_OTLP_METRICS_EXPORT_URL:http://localhost:4318/v1/metrics}
management.otlp.metrics.export.step=10s

# Resource attributes — identify this service in the OTel backend
management.otlp.metrics.export.resource-attributes.service.name=${SERVICE_NAME:jvmobservability}
management.otlp.metrics.export.resource-attributes.service.version=${SERVICE_VERSION:0.0.1}
management.otlp.metrics.export.resource-attributes.deployment.environment=${DEPLOYMENT_ENVIRONMENT:local}

# ─────────────────────────────────────────────────────────────────────────────
# Elasticsearch — Spring Data ES connection
# ─────────────────────────────────────────────────────────────────────────────
spring.elasticsearch.uris=${SPRING_ELASTICSEARCH_URIS:http://localhost:9200}

# Used by ElasticsearchInitializer to create the OTel metrics index template
elasticsearch.url=${ELASTICSEARCH_URL:http://localhost:9200}

# Logging level for ES client — set to DEBUG locally, INFO/WARN on OCP via LOG_LEVEL_ES
logging.level.org.springframework.data.elasticsearch.client=${LOG_LEVEL_ES:DEBUG}
logging.level.org.springframework.data.elasticsearch.core=${LOG_LEVEL_ES:DEBUG}
logging.level.tracer=${LOG_LEVEL_TRACER:TRACE}

# ─────────────────────────────────────────────────────────────────────────────
# Percentile Histograms — pushed to OTel Collector as ExplicitBucketHistogram
#
# WHY: Without this, the OTLP exporter only sends count + sum (mean only).
#      With this enabled, each timer push includes bucket boundaries and counts
#      → Elasticsearch stores them → Kibana can render p50 / p95 / p99 panels.
# ─────────────────────────────────────────────────────────────────────────────

# HTTP server request latency — auto-instrumented by Micrometer
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.75,0.95,0.99
management.metrics.distribution.slo.http.server.requests=50ms,200ms,1s

# Upload duration — custom business metric from SongMetrics
management.metrics.distribution.percentiles-histogram.music.song.upload.duration=true
management.metrics.distribution.percentiles.music.song.upload.duration=0.5,0.75,0.95,0.99

# Search duration — custom business metric from SongMetrics
management.metrics.distribution.percentiles-histogram.music.song.search.duration=true
management.metrics.distribution.percentiles.music.song.search.duration=0.5,0.95,0.99

# Upload file size distribution
management.metrics.distribution.percentiles-histogram.music.song.upload.size.bytes=true
management.metrics.distribution.percentiles.music.song.upload.size.bytes=0.5,0.95,0.99

# ─────────────────────────────────────────────────────────────────────────────
# MongoDB metrics — excluded from /actuator/prometheus
# MongoDB observability is handled by the dedicated mongo-exporter at :9216
# ─────────────────────────────────────────────────────────────────────────────
management.metrics.mongo.command.enabled=false
management.metrics.mongo.connectionpool.enabled=false
management.metrics.enable.mongodb=false
